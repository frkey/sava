name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# One run per ref; cancel superseded runs to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Tests
        run: npm run test
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
